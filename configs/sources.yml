sources:
  - id: arxiv
    name: arXiv
    enabled: true
    type: paper_preprint
    url: https://arxiv.org
    description: Public preprints for AI, ML, systems, and agents research.
    tags: [research, papers]
    queries:
      - AI agent
      - coding agent
      - agent memory
    categories:
      - cs.AI
      - cs.CL
      - cs.SE
    max_results: 10
    freshness_days: 14
  - id: openreview
    name: OpenReview
    enabled: false
    type: paper_review
    url: https://openreview.net
    description: Conference submissions and reviews where public access is available.
    tags: [research, conferences]
  - id: github
    name: GitHub
    enabled: true
    type: code_repository
    url: https://github.com
    description: Public repositories, releases, stars, and developer activity signals.
    tags: [code, devtools]
    queries:
      - AI agent
      - coding agent
      - LLM infrastructure
    min_stars: 100
    max_results: 10
    freshness_days: 30
  - id: hackernews
    name: Hacker News
    enabled: true
    type: community_discussion
    url: https://news.ycombinator.com
    description: Public technology discussions and launch feedback.
    tags: [community, discussion]
    keywords:
      - AI agent
      - coding agent
      - LLM
      - MCP
      - developer tools
    min_score: 20
    max_results: 20
    freshness_days: 7
  - id: company_blogs
    name: Company Blogs
    enabled: true
    type: publication
    description: Public engineering, research, and product blogs from AI companies.
    tags: [company, product, research]
    keywords:
      - agent
      - coding
      - model
      - inference
      - developer
    max_results: 20
    freshness_days: 30
    feeds:
      - name: OpenAI Blog
        url: https://openai.com/news/rss.xml
      - name: Anthropic News
        url: https://www.anthropic.com/news/rss.xml
      - name: Google DeepMind Blog
        url: https://deepmind.google/discover/blog/rss.xml
  - id: devpost
    name: Devpost
    enabled: false
    type: hackathon_project
    url: https://devpost.com
    description: Public hackathon projects and prototypes.
    tags: [projects, prototypes]
