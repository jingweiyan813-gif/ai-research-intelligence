name: Weekly Eval

on:
  schedule:
    - cron: "30 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run eval
        run: python scripts/run_eval.py
      - name: Commit eval reports
        run: |
          git config user.name "ai-research-radar-bot"
          git config user.email "bot@example.com"
          git add data/reports/eval
          git diff --cached --quiet || git commit -m "Update weekly eval report"
          git push || true
