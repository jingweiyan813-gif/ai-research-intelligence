name: Urgent Research Alerts

on:
  schedule:
    - cron: "0 6,18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  alerts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run alerts
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          REPORT_FROM_EMAIL: ${{ secrets.REPORT_FROM_EMAIL }}
          REPORT_TO_EMAIL: ${{ secrets.REPORT_TO_EMAIL }}
        run: python scripts/run_alerts.py
      - name: Commit alert reports
        run: |
          git config user.name "ai-research-radar-bot"
          git config user.email "bot@example.com"
          git add data/reports data/state
          git diff --cached --quiet || git commit -m "Update urgent alerts"
          git push || true
